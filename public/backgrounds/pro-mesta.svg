<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 1920 1080"
  width="1920" height="1080"
  preserveAspectRatio="xMidYMid slice">

  <defs>
    <!-- Bottom-left blue -->
    <radialGradient id="blueGrad" cx="20%" cy="50%" r="90%">
      <stop offset="0%" stop-color="#447799" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>


    <!-- White top fade -->
    <linearGradient id="whiteTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Strong grain -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" seed="8" result="noise" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="3.5" intercept="-1.2" />
        <feFuncG type="linear" slope="3.5" intercept="-1.2" />
        <feFuncB type="linear" slope="3.5" intercept="-1.2" />
        <feFuncA type="table" tableValues="0 0.8" />
      </feComponentTransfer>
    </filter>
    <!-- Hexagonal pattern overlay -->
    <pattern xlink:href="#background-ptbk_svg__a" id="background-ptbk_svg__c" x="0" y="0"
      patternTransform="translate(1 1)scale(1.777)" preserveAspectRatio="xMidYMid"></pattern>
    <pattern id="background-ptbk_svg__a" width="99" height="87" fill="none" stroke="currentColor"
      stroke-width="0.5" patternTransform="matrix(.5 0 0 .5 1 1)" patternUnits="userSpaceOnUse"
      preserveAspectRatio="xMidYMid">
      <g id="background-ptbk_svg__b">
        <path d="M99.696 14.45 74.94 28.744 50.18 14.45v0L74.94.156Z"
          style="fill: rgb(126, 126, 126); stroke-width: 0.485301; stroke-linecap: round; paint-order: stroke; fill-opacity: 0.9;"></path>
        <path d="M74.939 57.331 50.18 43.037V14.45v0L74.94 28.744z"
          style="fill: rgb(126, 126, 126); stroke-width: 0.485301; stroke-linecap: round; paint-order: stroke; fill-opacity: 0.5;"></path>
        <path d="M99.696 14.45v28.587L74.94 57.331v0-28.587z"
          style="fill: rgb(126, 126, 126); stroke-width: 0.485301; stroke-linecap: round; paint-order: stroke; fill-opacity: 0.1;"></path>
      </g>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(-24.757 42.881)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(-49.515)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(-24.757 -42.881)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(24.757 42.881)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(-74.272 42.881)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(49.515)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(24.757 -42.881)"></use>
      <use xlink:href="#background-ptbk_svg__b" transform="translate(-74.272 -42.881)"></use>
    </pattern>
  </defs>

  <!-- White base -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Gradients -->
  <rect width="100%" height="100%" fill="url(#blueGrad)" />
  <rect width="100%" height="100%" fill="url(#redGrad)" style="mix-blend-mode:screen; opacity:0.85" />

  <!-- White fade on top -->
  <rect width="100%" height="100%" fill="url(#whiteTopGrad)" />

  <!-- Hexagonal pattern overlay -->
  <rect width="100%" height="100%"
    style="fill: url(#background-ptbk_svg__c); fill-opacity: 0.09; stroke-width: 0.5; stroke-linecap: round; stroke-dasharray: none; stroke-opacity: 1; paint-order: stroke;" />

  <!-- Strong visible noise -->
  <rect width="100%" height="100%" filter="url(#grain)"
    style="mix-blend-mode:soft-light; opacity:1.2" />
</svg>