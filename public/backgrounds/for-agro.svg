<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153D26"/>
      <stop offset="1" stop-color="#091A12"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 860) rotate(11.2) scale(1180 760)">
      <stop stop-color="#5FAE63"/>
      <stop offset="1" stop-color="#5FAE63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1540 220) rotate(154.7) scale(900 560)">
      <stop stop-color="#2D7A58"/>
      <stop offset="1" stop-color="#2D7A58" stop-opacity="0"/>
    </radialGradient>
    <pattern id="furrows" width="180" height="180" patternUnits="userSpaceOnUse">
      <path d="M-40 182C30 140 150 140 220 182" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
      <path d="M-40 152C30 110 150 110 220 152" stroke="white" stroke-opacity="0.06" stroke-width="2"/>
      <path d="M-40 122C30 80 150 80 220 122" stroke="white" stroke-opacity="0.05" stroke-width="2"/>
      <path d="M-40 92C30 50 150 50 220 92" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
    </pattern>
    <filter id="noise" x="0" y="0" width="1" height="1">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="11" result="turb"/>
      <feColorMatrix in="turb" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow-left)"/>
  <rect width="1920" height="1080" fill="url(#glow-right)"/>
  <rect width="1920" height="1080" fill="url(#furrows)"/>
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.65"/>
</svg>

