<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1920 1080"
  width="1920" height="1080"
  preserveAspectRatio="xMidYMid slice">

  <defs>
    <radialGradient id="greenGrad" cx="15%" cy="100%" r="90%">
      <stop offset="0%" stop-color="#d9f99d" />
      <stop offset="50%" stop-color="#4d9b3d" />
      <stop offset="100%" stop-color="#0b2216" />
    </radialGradient>

    <radialGradient id="goldGrad" cx="100%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#fff3b0" />
      <stop offset="55%" stop-color="#b48a1f" />
      <stop offset="100%" stop-color="#2c1600" />
    </radialGradient>

    <linearGradient id="whiteTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2" />
    </linearGradient>

    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="2.8" numOctaves="3" seed="6" result="noise" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="3.2" intercept="-1.1" />
        <feFuncG type="linear" slope="3.2" intercept="-1.1" />
        <feFuncB type="linear" slope="3.2" intercept="-1.1" />
        <feFuncA type="table" tableValues="0 0.8" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  <rect width="100%" height="100%" fill="url(#greenGrad)" />
  <rect width="100%" height="100%" fill="url(#goldGrad)" style="mix-blend-mode:screen; opacity:0.75" />
  <rect width="100%" height="100%" fill="url(#whiteTopGrad)" />
  <rect width="100%" height="100%" filter="url(#grain)" style="mix-blend-mode:soft-light; opacity:1" />
</svg>
